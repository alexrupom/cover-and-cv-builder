name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rspec:
    name: RSpec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7.7'
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec
